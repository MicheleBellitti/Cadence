name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # Run on PR events, or on issue comments that mention @claude on a PR
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review this pull request for the Cadence project (Next.js 15 + Firebase + Zustand).
            Focus on:
            - Correctness and potential bugs
            - Firebase auth/Firestore data isolation issues
            - TypeScript type safety
            - React hook dependency correctness
            - Security concerns (XSS, injection, etc.)
